<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 꽃피우기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1a1a2e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 14px 50px;
  font-family: "Malgun Gothic","Apple SD Gothic Neo",sans-serif;
  color: #e0d9c8;
}
h1 {
  font-size: 1.2rem;
  letter-spacing: 0.25em;
  margin-bottom: 18px;
  color: #c9a96e;
  text-align: center;
  font-weight: 400;
}
.form-panel {
  background: #16213e;
  border: 1px solid #c9a96e44;
  border-radius: 12px;
  padding: 18px 14px 16px;
  width: 100%;
  max-width: 400px;
  margin-bottom: 18px;
}
.pillar-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px 8px;
  margin-bottom: 14px;
}
.pillar-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.pillar-label { font-size: 0.7rem; letter-spacing: 0.1em; color: #c9a96e; }
.char-select {
  background: #0f3460;
  border: 1px solid #c9a96e66;
  border-radius: 6px;
  color: #e0d9c8;
  padding: 7px 2px;
  font-size: 1.05rem;
  font-family: inherit;
  width: 100%;
  text-align: center;
  text-align-last: center;
  cursor: pointer;
}
.char-select option { background: #0f3460; }
.preview-row { display: flex; justify-content: center; gap: 7px; margin-bottom: 14px; }
.preview-chip {
  padding: 3px 9px;
  border-radius: 14px;
  font-size: 0.92rem;
  font-weight: bold;
  border: 1px solid rgba(255,255,255,0.15);
  min-width: 32px;
  text-align: center;
}
.bottom-row { display: flex; align-items: center; justify-content: center; gap: 12px; }
.opt-select {
  background: #0f3460;
  border: 1px solid #c9a96e66;
  border-radius: 6px;
  color: #e0d9c8;
  padding: 8px 10px;
  font-size: 0.88rem;
  font-family: inherit;
  cursor: pointer;
}
.opt-select option { background: #0f3460; }
.main-btn {
  background: #c9a96e;
  color: #1a1a2e;
  border: none;
  border-radius: 7px;
  padding: 9px 22px;
  font-size: 0.95rem;
  font-family: inherit;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.08em;
}
.main-btn:active { background: #e0c080; }
.sub-btn {
  background: transparent;
  color: #c9a96e;
  border: 1px solid #c9a96e;
  border-radius: 7px;
  padding: 8px 16px;
  font-size: 0.88rem;
  font-family: inherit;
  cursor: pointer;
  width: 100%;
}
.sub-btn:active { background: #c9a96e22; }
#result-area {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 100%;
  max-width: 400px;
  margin-bottom: 10px;
}
.save-hint {
  background: #c9a96e18;
  border: 1px solid #c9a96e44;
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 0.78rem;
  color: #c9a96ecc;
  text-align: center;
  line-height: 1.6;
  width: 100%;
}
.save-hint strong { color: #e0c080; }
#result-img {
  width: 100%;
  border-radius: 4px;
  display: block;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  -webkit-touch-callout: default;
}
.section-title {
  width: 100%;
  max-width: 400px;
  font-size: 0.72rem;
  color: #c9a96e88;
  letter-spacing: 0.18em;
  margin: 22px 0 8px;
  text-align: center;
}
#history-list { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 7px; }
.hist-item {
  background: #16213e;
  border: 1px solid #c9a96e2a;
  border-radius: 8px;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.hist-item:active { border-color: #c9a96e; background: #1e2d50; }
.hist-pillars { display: flex; gap: 5px; flex-wrap: wrap; }
.hist-chip {
  padding: 2px 7px;
  border-radius: 11px;
  font-size: 0.8rem;
  font-weight: bold;
  border: 1px solid rgba(255,255,255,0.1);
}
.hist-right { display: flex; align-items: center; gap: 8px; }
.hist-meta { font-size: 0.68rem; color: #c9a96e66; white-space: nowrap; }
.hist-del {
  background: none;
  border: none;
  color: #c9a96e44;
  font-size: 1rem;
  cursor: pointer;
  padding: 4px 6px;
  line-height: 1;
}
.hist-del:active { color: #ff6b6b; }
#saju-canvas { display: none; }
#logo-src { display: none; }
</style>
</head>

<script>
var CG = {};
CG["gab"] = "#208000";
CG["eul"] = "#aaff00";
CG["byeong"] = "#ff0000";
CG["jeong"] = "#b20000";
CG["mu"] = "#ffff00";
CG["gi"] = "#ffd400";
CG["gyeong"] = "#dfdfdf";
CG["sin"] = "#ffffff";
CG["im"] = "#000000";
CG["gye"] = "#00007f";

var CGAN_K = ["갑","을","병","정","무","기","경","신","임","계"];
var CGAN_E = ["gab","eul","byeong","jeong","mu","gi","gyeong","sin","im","gye"];
var JIJI_K = ["자","축","인","묘","진","사","오","미","신","유","술","해"];
var JIJI_E = ["ja","chuk","in","myo","jin","sa","o","mi","sin","yu","sul","hae"];

var JC = {};
JC["in"]   = [["mu",7],["byeong",7],["gab",14]];
JC["myo"]  = [["gab",10],["eul",20]];
JC["jin"]  = [["eul",9],["gye",3],["mu",18]];
JC["sa"]   = [["mu",7],["gyeong",7],["byeong",14]];
JC["o"]    = [["byeong",10],["gi",9],["jeong",11]];
JC["mi"]   = [["jeong",9],["eul",3],["gi",18]];
JC["sin"]  = [["mu",7],["im",7],["gyeong",14]];
JC["yu"]   = [["gyeong",10],["sin",20]];
JC["sul"]  = [["sin",9],["jeong",3],["mu",18]];
JC["hae"]  = [["mu",7],["gab",7],["im",14]];
JC["ja"]   = [["im",10],["gye",20]];
JC["chuk"] = [["gye",9],["sin",3],["gi",18]];

function ganKey(k) { return CGAN_E[CGAN_K.indexOf(k)]; }
function jiKey(k)  { return JIJI_E[JIJI_K.indexOf(k)]; }
function ganColor(k) { return CG[ganKey(k)]; }

function lum(hex) {
  var h = hex.replace("#","");
  var r = parseInt(h.slice(0,2),16);
  var g = parseInt(h.slice(2,4),16);
  var b = parseInt(h.slice(4,6),16);
  return 0.299*r + 0.587*g + 0.114*b;
}
function fg(hex) { return lum(hex) > 128 ? "#000" : "#fff"; }
function mm(v) { return Math.round(v * 300 / 25.4); }

var IDS = {
  "nyeon-gan":"nyeon-ji","wol-gan":"wol-ji","il-gan":"il-ji","si-gan":"si-ji"
};
var PAIR_ORDER = [["si-gan","si-ji"],["il-gan","il-ji"],["wol-gan","wol-ji"],["nyeon-gan","nyeon-ji"]];

function buildSelects() {
  ["si-gan","il-gan","wol-gan","nyeon-gan"].forEach(function(id) {
    var sel = document.getElementById(id);
    CGAN_K.forEach(function(ch) {
      var o = document.createElement("option");
      o.value = ch;
      o.textContent = ch;
      sel.appendChild(o);
    });
    sel.addEventListener("change", updatePreview);
  });
  ["si-ji","il-ji","wol-ji","nyeon-ji"].forEach(function(id) {
    var sel = document.getElementById(id);
    JIJI_K.forEach(function(ch) {
      var o = document.createElement("option");
      o.value = ch;
      o.textContent = ch;
      sel.appendChild(o);
    });
    sel.addEventListener("change", updatePreview);
  });
  document.getElementById("nyeon-gan").value = "갑";
  document.getElementById("nyeon-ji").value  = "자";
  document.getElementById("wol-gan").value   = "갑";
  document.getElementById("wol-ji").value    = "자";
  document.getElementById("il-gan").value    = "갑";
  document.getElementById("il-ji").value     = "자";
  document.getElementById("si-gan").value    = "갑";
  document.getElementById("si-ji").value     = "자";
  updatePreview();
}

function updatePreview() {
  var row = document.getElementById("preview-row");
  row.innerHTML = "";
  PAIR_ORDER.forEach(function(pair) {
    var g = document.getElementById(pair[0]).value;
    var j = document.getElementById(pair[1]).value;
    var c = ganColor(g);
    var chip = document.createElement("div");
    chip.className = "preview-chip";
    chip.style.background = c;
    chip.style.color = fg(c);
    chip.textContent = g + j;
    row.appendChild(chip);
  });
}

function getSaju() {
  return {
    ng: document.getElementById("nyeon-gan").value,
    nj: document.getElementById("nyeon-ji").value,
    wg: document.getElementById("wol-gan").value,
    wj: document.getElementById("wol-ji").value,
    ig: document.getElementById("il-gan").value,
    ij: document.getElementById("il-ji").value,
    sg: document.getElementById("si-gan").value,
    sj: document.getElementById("si-ji").value
  };
}

function drawJiji(ctx, x, y, cw, jh, jiji_k) {
  var key = jiKey(jiji_k);
  var comps = JC[key];
  var total = 0;
  for (var i=0; i<comps.length; i++) total += comps[i][1];
  var cy = y;
  for (var i=0; i<comps.length; i++) {
    var h = (i === comps.length-1) ? (y+jh-cy) : Math.round(jh * comps[i][1] / total);
    ctx.fillStyle = CG[comps[i][0]];
    ctx.fillRect(x, cy, cw, h);
    cy += h;
  }
}

function renderBase(s, paper) {
  var canvas = document.getElementById("saju-canvas");
  var PW = (paper === "A3") ? 297 : 210;
  var PH = (paper === "A3") ? 420 : 297;
  var CW = mm(PW);
  var CH = mm(PH);
  canvas.width  = CW;
  canvas.height = CH;
  var ctx = canvas.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, CW, CH);

  var cw = CW / 7;
  var TH = mm(117);
  var TR = TH / 4;
  var JH = mm(180);
  var JY = TH;

  function cx(col) { return (col-1) * cw; }
  function ty(row) { return (row-1) * TR; }

  var cn = ganColor(s.ng);
  var cm = ganColor(s.wg);
  var cd = ganColor(s.ig);
  var ct = ganColor(s.sg);

  // 년간
  ctx.fillStyle = cn;
  ctx.fillRect(cx(1), ty(1), cw, TH);
  ctx.fillRect(cx(7), ty(1), cw, TH);
  ctx.fillRect(cx(1), ty(1), cw*7, TR);

  // 월간
  ctx.fillStyle = cm;
  ctx.fillRect(cx(2), ty(2), cw*5, TR*3);

  // 시간 내접원
  var six  = cx(4) + cw/2;
  var siy  = ty(3) + TR/2;
  var siRad = Math.min(cw, TR)/2 - mm(0.2);
  ctx.beginPath();
  ctx.arc(six, siy, siRad, 0, Math.PI*2);
  ctx.fillStyle = ct;
  ctx.fill();

  // 지지
  var jijiMap = [
    [s.nj, [1,7]],
    [s.wj, [2,6]],
    [s.ij, [3,5]],
    [s.sj, [4]]
  ];
  for (var i=0; i<jijiMap.length; i++) {
    var jiji_k = jijiMap[i][0];
    var cols   = jijiMap[i][1];
    for (var j=0; j<cols.length; j++) {
      drawJiji(ctx, cx(cols[j]), JY, cw, JH, jiji_k);
    }
  }

  // 경계선
  var lw2 = mm(0.35);
  function oc(g_k) { return (ganKey(g_k) === "im") ? "#ffffff" : "#000000"; }

  if (cn === cm) {
    ctx.strokeStyle = oc(s.ng);
    ctx.lineWidth = lw2;
    ctx.strokeRect(cx(2)+lw2/2, ty(2)+lw2/2, cw*5-lw2, TR*3-lw2);
    var xs = [cx(2), cx(7)];
    for (var i=0; i<xs.length; i++) {
      ctx.beginPath();
      ctx.moveTo(xs[i], ty(1));
      ctx.lineTo(xs[i], ty(2));
      ctx.stroke();
    }
  }
  if (cm === ct) {
    ctx.beginPath();
    ctx.arc(six, siy, siRad, 0, Math.PI*2);
    ctx.strokeStyle = oc(s.sg);
    ctx.lineWidth = lw2;
    ctx.stroke();
  }

  // 일간 외접원 (최상위)
  var dc = [[2,4],[3,3],[3,5],[4,4]];
  var dcRad = Math.sqrt(cw*cw + TR*TR) / 2;
  for (var i=0; i<dc.length; i++) {
    var ox = cx(dc[i][1]) + cw/2;
    var oy = ty(dc[i][0]) + TR/2;
    ctx.beginPath();
    ctx.arc(ox, oy, dcRad, 0, Math.PI*2);
    ctx.fillStyle = cd;
    ctx.fill();
  }
  for (var i=0; i<dc.length; i++) {
    var r2 = dc[i][0], c2 = dc[i][1];
    var bgC = (r2===3 && c2===4) ? ct : cm;
    if (bgC === cd) {
      var ox2 = cx(c2) + cw/2;
      var oy2 = ty(r2) + TR/2;
      ctx.beginPath();
      ctx.arc(ox2, oy2, dcRad, 0, Math.PI*2);
      ctx.strokeStyle = oc(s.ig);
      ctx.lineWidth = lw2;
      ctx.stroke();
    }
  }

  return { canvas:canvas, ctx:ctx, cw:cw, TH:TH, JH:JH };
}

function generateSaju() {
  var s     = getSaju();
  var paper = document.getElementById("paper").value;
  var res   = renderBase(s, paper);

  // 로고: 열 너비(colW)의 70% 정사각형, 7열 하단에 우하단 정렬
  var logoSize  = res.cw * 0.7;
  var logoMargin = (res.cw - logoSize) / 2;              // 좌우 여백 = 아래 여백
  var logoX     = res.cw * 6 + logoMargin;               // 7열 수평 중앙
  var logoY     = res.TH + res.JH - logoSize - logoMargin; // 아래도 동일 간격

  var logoEl = document.getElementById("logo-src");
  res.ctx.drawImage(logoEl, logoX, logoY, logoSize, logoSize);

  var url = res.canvas.toDataURL("image/jpeg", 0.95);
  document.getElementById("result-img").src = url;
  document.getElementById("result-area").style.display = "flex";
  document.getElementById("result-area").scrollIntoView({behavior:"smooth", block:"start"});
  addHist(s, url);
}

function openInNewTab() {
  var imgEl = document.getElementById("result-img");
  if (!imgEl.src || imgEl.src.length < 100) {
    alert("먼저 그리기를 눌러주세요.");
    return;
  }
  var w = window.open();
  w.document.open();
  w.document.write("<html><body style='margin:0;background:#000'><img src='" + imgEl.src + "' style='width:100%;display:block'></body></html>");
  w.document.close();
}

function loadHist() {
  try { return JSON.parse(localStorage.getItem("saju_hist") || "[]"); }
  catch(e) { return []; }
}
function saveHist(l) { localStorage.setItem("saju_hist", JSON.stringify(l)); }

function addHist(s, url) {
  var l = loadHist();
  var entry = {
    id: Date.now(),
    ng:s.ng, nj:s.nj, wg:s.wg, wj:s.wj,
    ig:s.ig, ij:s.ij, sg:s.sg, sj:s.sj,
    thumb: url,
    date: new Date().toLocaleString("ko-KR", {month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})
  };
  l.unshift(entry);
  if (l.length > 20) l.pop();
  saveHist(l);
  renderHist();
}

function loadFromEntry(entry) {
  document.getElementById("nyeon-gan").value = entry.ng;
  document.getElementById("nyeon-ji").value  = entry.nj;
  document.getElementById("wol-gan").value   = entry.wg;
  document.getElementById("wol-ji").value    = entry.wj;
  document.getElementById("il-gan").value    = entry.ig;
  document.getElementById("il-ji").value     = entry.ij;
  document.getElementById("si-gan").value    = entry.sg;
  document.getElementById("si-ji").value     = entry.sj;
  updatePreview();
  document.getElementById("result-img").src = entry.thumb;
  document.getElementById("result-area").style.display = "flex";
  window.scrollTo({top:0, behavior:"smooth"});
}

function renderHist() {
  var l     = loadHist();
  var wrap  = document.getElementById("history-list");
  var title = document.getElementById("hist-title");
  wrap.innerHTML = "";
  if (!l.length) { title.style.display = "none"; return; }
  title.style.display = "block";

  for (var i=0; i<l.length; i++) {
    (function(entry) {
      var item = document.createElement("div");
      item.className = "hist-item";

      var chips = document.createElement("div");
      chips.className = "hist-pillars";
      var pairs = [[entry.sg,entry.sj],[entry.ig,entry.ij],[entry.wg,entry.wj],[entry.ng,entry.nj]];
      for (var p=0; p<pairs.length; p++) {
        var c = ganColor(pairs[p][0]);
        var chip = document.createElement("div");
        chip.className = "hist-chip";
        chip.style.background = c;
        chip.style.color = fg(c);
        chip.textContent = pairs[p][0] + pairs[p][1];
        chips.appendChild(chip);
      }

      var right = document.createElement("div");
      right.className = "hist-right";
      var meta = document.createElement("div");
      meta.className = "hist-meta";
      meta.textContent = entry.date;
      var del = document.createElement("button");
      del.className = "hist-del";
      del.textContent = "X";
      del.onclick = (function(eid) {
        return function(e) {
          e.stopPropagation();
          saveHist(loadHist().filter(function(h){ return h.id !== eid; }));
          renderHist();
        };
      })(entry.id);

      right.appendChild(meta);
      right.appendChild(del);
      item.appendChild(chips);
      item.appendChild(right);
      item.onclick = function() { loadFromEntry(entry); };
      wrap.appendChild(item);
    })(l[i]);
  }
}

buildSelects();
renderHist();
</script>
